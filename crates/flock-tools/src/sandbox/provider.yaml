identity:
  id: sandbox
  name:
    zh: Sandbox 沙盒
    en: Sandbox
  description:
    zh: 沙盒环境工具集，提供安全隔离的代码执行、浏览器自动化、计算机操控及沙盒命令执行能力
    en: Sandboxed toolset providing isolated code execution, browser automation, computer use control, and safe command execution in a secure environment.

credentials_schema:
  __type: sandbox_settings

tools:
  CodeExecution:
    name:
      zh: 沙盒代码执行
      en: Sandbox Code Execution
    description:
      zh: 在安全的独立沙盒容器中执行 python 脚本或 bash shell 命令，避免对本地主机产生副作用。
      en: Execute Python scripts or Bash shell commands inside a secure, isolated sandbox container.
    params:
      code:
        zh: 准备运行的完整 Python 或 Bash 脚本代码
        en: The Python or Bash code to execute.
      language:
        zh: 代码所用的脚本语言，支持 'python' 或 'bash'
        en: The programming language of the script, 'python' or 'bash'.
  Browser:
    name:
      zh: 浏览器控制
      en: Browser Control
    description:
      zh: 控制沙盒内的 Chromium 浏览器实例，用于查看网页、点击页面元素、输入文本和滚动等自动化操作。
      en: Control a Chromium browser instance inside the sandbox for web automation tasks.
    params:
      action:
        zh: 要执行的浏览器操作：navigate (导航), click (点击), type (输入), scroll (滚动), back (后退), key_combo (按键组合)
        en: "Browser action to execute: navigate, click, type, scroll, back, key_combo"
      url:
        zh: 需要导航访问的网址（仅在 action 为 navigate 时必填）
        en: The URL to navigate to (required only when action is navigate)
      selector:
        zh: 目标元素的 CSS 选择器（在 click、type、scroll 时必填）
        en: The CSS selector of the target element (required for click, type, scroll)
      text:
        zh: 要输入的文本内容（仅在 action 为 type 时必填）
        en: The text to type (required only when action is type)
      key:
        zh: 待按下的键盘按键组合（仅在 action 为 key_combo 时必填）
        en: Keyboard key combination to press (required only when action is key_combo)
  ComputerUse:
    name:
      zh: 电脑使用
      en: Computer Use
    description:
      zh: 对沙盒系统进行完全控制的工具，包括鼠标移动、点击、拖拽、键盘按键输入、截图以及延时等待等。
      en: Take complete control of the sandboxed OS, including mouse movement, clicks, typing, and screenshot capturing.
    params:
      action:
        zh: 要执行的操作动作（例如 mouse_move, left_click, type, screenshot 等）
        en: Action to perform (e.g., mouse_move, left_click, type, screenshot)
      text:
        zh: 需要输入的文本内容（仅在 action 为 type 时必填）
        en: Text content to type (required only when action is type)
      coordinate:
        zh: 操作对应的屏幕坐标 [x, y]
        en: The coordinate [x, y] on the screen
  SandboxExec:
    name:
      zh: 沙盒命令行
      en: Sandbox Command Execution
    description:
      zh: 在沙盒容器的隔离环境内运行指定的 shell 命令行指令。
      en: Run a bash command in the isolated sandbox environment.
    params:
      command:
        zh: 需要执行的命令行内容
        en: The shell command to run
  RequestHumanAssistance:
    name:
      zh: 请求人类协助
      en: Request Human Assistance
    description:
      zh: 当遇到需要用户决策或操作时，发起人类协助请求。
      en: Ask the user for help or decision-making assistance.
    params:
      reason:
        zh: 需要人类协助的理由
        en: The reason why human assistance is required
  SandboxRead:
    name:
      zh: 沙盒读取文件
      en: Sandbox Read File
    description:
      zh: 在沙盒隔离容器中读取文件内容。
      en: Read a file inside the sandboxed container.
    params:
      file_path:
        zh: 要读取 of 文件的绝对路径
        en: The absolute path of the file to read
  SandboxWrite:
    name:
      zh: 沙盒写入文件
      en: Sandbox Write File
    description:
      zh: 在沙盒隔离容器中写入新文件。
      en: Write a file inside the sandboxed container.
    params:
      file_path:
        zh: 要写入的文件的绝对路径
        en: The absolute path of the file to write
      content:
        zh: 要写入的文件内容
        en: The content to write to the file
  SandboxEdit:
    name:
      zh: 沙盒修改文件
      en: Sandbox Edit File
    description:
      zh: 在沙盒隔离容器中精确编辑修改文件内容。
      en: Make precise edits to a file inside the sandboxed container.
    params:
      file_path:
        zh: 要编辑的文件的绝对路径
        en: The absolute path of the file to edit
      target_content:
        zh: 文件中需要被替换的精确原内容
        en: The target content to replace
      replacement_content:
        zh: 替换原内容的新内容
        en: The replacement content to write
